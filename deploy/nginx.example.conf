# Exemplu Nginx pentru Cantier (Vite SPA, build în dist/).
# Pași: npm run build → copiază conținutul lui dist/ pe server (ex. /var/www/cantier).
# Înlocuiește cantier.exemplu.ro cu domeniul tău; activează SSL cu certbot (vezi comentarii jos).

server {
    listen 80;
    listen [::]:80;
    server_name cantier.exemplu.ro;

    root /var/www/cantier;
    index index.html;

    # Cache agresiv pentru asset-uri cu hash din Vite
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Recomandat: antete de securitate (ajustează CSP dacă adaugi scripturi inline în index)
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "interest-cohort=(), geolocation=(), microphone=(), camera=()" always;
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; base-uri 'none'; frame-ancestors 'none';" always;

    # opțional: gzip
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}

# HTTPS (recomandat): după ce site-ul merge pe port 80, pe server rulează:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d cantier.exemplu.ro
# Certbot inserează bloc listen 443 ssl și căile certificatelor.
