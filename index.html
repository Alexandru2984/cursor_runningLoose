<!doctype html>
<html lang="ro" data-theme="dark" data-font="md">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#09090b" />
    <script>
      try {
        var raw = localStorage.getItem('cantier-settings')
        if (raw) {
          var s = JSON.parse(raw)
          if (s && s.theme) document.documentElement.dataset.theme = s.theme
          if (s && s.fontScale) document.documentElement.dataset.font = s.fontScale
        }
      } catch (e) {}
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <title>Cantier — hub local</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
